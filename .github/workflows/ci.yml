name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test-sqlite:
    runs-on: ubuntu-latest
    container: shivammathur/node:24.04
    name: PHP ${{ matrix.php }} (SQLite)
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_sqlite
          coverage: none

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run Unit tests
        run: vendor/bin/phpunit --testsuite Unit --exclude-group mysql --exclude-group postgres --no-coverage

      - name: Run Integration tests
        run: vendor/bin/phpunit --testsuite Integration --exclude-group mysql --exclude-group postgres --no-coverage

      - name: Run Feature tests
        run: vendor/bin/phpunit --testsuite Feature --exclude-group mysql --exclude-group postgres --no-coverage

  test-mysql:
    runs-on: ubuntu-latest
    container: shivammathur/node:24.04
    name: MySQL ${{ matrix.mysql }} / PHP ${{ matrix.php }}
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.5']
        mysql: ['8.0', '8.4']

    services:
      mysql:
        image: mysql:${{ matrix.mysql }}
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: pdo_wrapper_test
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_mysql
          coverage: none

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Wait for MySQL
        run: |
          for i in $(seq 1 90); do
            mysql -h mysql -uroot -proot -e "SELECT 1" pdo_wrapper_test >/dev/null 2>&1 && exit 0
            sleep 1
          done
          echo "MySQL not ready"; exit 1

      - name: Run MySQL tests
        run: vendor/bin/phpunit --group mysql --no-coverage
        env:
          MYSQL_HOST: mysql
          MYSQL_PORT: 3306
          MYSQL_DATABASE: pdo_wrapper_test
          MYSQL_USERNAME: root
          MYSQL_PASSWORD: root

  test-mariadb:
    runs-on: ubuntu-latest
    container: shivammathur/node:24.04
    name: MariaDB ${{ matrix.mariadb }} / PHP ${{ matrix.php }}
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.5']
        mariadb: ['10.11', '11.4']

    services:
      mariadb:
        image: mariadb:${{ matrix.mariadb }}
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: pdo_wrapper_test
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_mysql
          coverage: none

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Wait for MariaDB
        run: |
          for i in $(seq 1 90); do
            mysql -h mariadb -uroot -proot -e "SELECT 1" pdo_wrapper_test >/dev/null 2>&1 && exit 0
            sleep 1
          done
          echo "MariaDB not ready"; exit 1

      - name: Run MariaDB tests
        run: vendor/bin/phpunit --group mysql --no-coverage
        env:
          MYSQL_HOST: mariadb
          MYSQL_PORT: 3306
          MYSQL_DATABASE: pdo_wrapper_test
          MYSQL_USERNAME: root
          MYSQL_PASSWORD: root

  test-postgres:
    runs-on: ubuntu-latest
    container: shivammathur/node:24.04
    name: PGSQL ${{ matrix.postgres }} / PHP ${{ matrix.php }}
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.5']
        postgres: ['15', '16', '17']

    services:
      postgres:
        image: postgres:${{ matrix.postgres }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pdo_wrapper_test
        options: >-
          --health-cmd=pg_isready
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_pgsql
          coverage: none

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 90); do
            PGPASSWORD=postgres psql -h postgres -U postgres -d pdo_wrapper_test -c "SELECT 1" >/dev/null 2>&1 && exit 0
            sleep 1
          done
          echo "Postgres not ready"; exit 1

      - name: Run PostgreSQL tests
        run: vendor/bin/phpunit --group postgres --no-coverage
        env:
          POSTGRES_HOST: postgres
          POSTGRES_PORT: 5432
          POSTGRES_DATABASE: pdo_wrapper_test
          POSTGRES_USERNAME: postgres
          POSTGRES_PASSWORD: postgres

  analyse:
    runs-on: ubuntu-latest
    container: shivammathur/node:24.04
    name: Static Analysis

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run PHPStan
        run: composer analyse

  code-style:
    runs-on: ubuntu-latest
    container: shivammathur/node:24.04
    name: Code Style

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Check code style
        run: composer cs